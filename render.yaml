services:
  - type: web
    name: duka-pos
    env: node
    region: frankfurt    # closest to Kenya
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false        # you paste this in from Supabase
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
